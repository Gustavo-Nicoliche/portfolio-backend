# ── Servidor ──────────────────────────────────────
# Porta onde o Spring Boot vai rodar localmente
server.port=8080

# ── Banco de dados ────────────────────────────────
# URL de conexão com o PostgreSQL
# Formato: jdbc:postgresql://host:porta/nome_do_banco
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio

# Usuário e senha que criamos no PostgreSQL
spring.datasource.username=gustavo
spring.datasource.password=123456

# Driver JDBC do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────
# Dialeto: diz ao Hibernate que estamos usando PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# update → cria/atualiza as tabelas automaticamente ao iniciar
# Útil em desenvolvimento. Em produção usaremos "validate"
spring.jpa.hibernate.ddl-auto=update

# Exibe as queries SQL no console (ótimo para aprendizado!)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true